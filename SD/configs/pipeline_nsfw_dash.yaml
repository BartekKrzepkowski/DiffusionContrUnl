# =============================================================================
# SD NSFW RL/ROFT + DASH Warm-Start Pipeline Config
# =============================================================================
# Usage:
#   cd SD
#   python pipeline.py --config configs/pipeline_nsfw_dash.yaml
#
# Switch to ROFT by setting:
#   unlearn:
#     method: "roft"
#
# Baselines use the same config with:
#   dash:
#     warm_start: false
# =============================================================================

wandb:
  use_wandb: true
  project: "stable_diff_dash"
  entity: null
  group: "nsfw-rl-roft-dash"
  mode: "online"
  tags: ["sd", "nsfw"]
  log_model_artifact: false

pipeline:
  setting: "sd_nsfw"
  seed: 42
  device: "0"

paths:
  sd_config: "configs/stable-diffusion/v1-intact.yaml"
  sd_ckpt: "/net/storage/pr3/plgrid/plggdnnp/SD/models/ldm/stable-diffusion-v1/sd-v1-4-full-ema.ckpt"
  diffusers_config: "diffusers_unet_config.json"
  nsfw_prompts: "prompts/unsafe-prompts4703.csv"
  prompts: "prompts/imagenette.csv"
  output_dir: "/net/storage/pr3/plgrid/plggdnnp/plgkrzepk/SD/evaluation"
  model_save_dir: "/net/storage/pr3/plgrid/plggdnnp/plgkrzepk/SD/models"
  logs_dir: "/net/storage/pr3/plgrid/plggdnnp/plgkrzepk/SD/logs"
  # Generated by SD/scripts/slurm_sd_generate_nsfw_data.sh.
  nsfw_data: "/net/storage/pr3/plgrid/plggdnnp/plgkrzepk/SD/data/nsfw"
  not_nsfw_data: "/net/storage/pr3/plgrid/plggdnnp/plgkrzepk/SD/data/not-nsfw"

unlearn:
  method: "roft"                      # rl | roft | intact | nsfw
  train_method: unet                 # null = train dash.target when DASH is enabled; otherwise unet_xattn
  alpha: 0.1
  batch_size: 10
  epochs: 15
  # epochs: 1
  lr: 5.0e-6
  image_size: 512
  full_retain_per_epoch: true
  wandb_log_interval: 1
  log_grad_norms: true
  grad_norm_log_interval: 3

dash:
  warm_start: false
  target: "unet_resnet"                    # e.g. "unet_resnet", "unet_attn", "unet_xattn", "full"
  include_bias: false

  plasticity_granularity: "per_filter"
  attention_head_wise: true # Intentional default; Slurm flags may override.

  signal_mode: "retain_only"
  grad_aggregation: "mean"
  alpha: 0.1
  num_aug: 1
  aug_mode: "none"

  min_shrink: 0.8

  svd_truncate_evr: 0.95
  preserve_forget_evr: 0.95

  retain_batches: 8
  forget_batches: 8

  log_cosine_histograms: true
  cosine_hist_bins: 50

  attention_logging:
    enabled: true
    log_histogram: true
    log_cdf: true
    log_median: true
    log_delta_norms: false
    groups:
      - "attn2.to_q"
      - "attn2.to_k"
      - "attn2.to_v"
      - "attn2.to_out"

  nsfw:
    enabled: true
    loss_mode: "denoise"
    forget_prompt: "a photo of a nude person"
    retain_prompt: "a photo of a person wearing clothes"

train_eval:
  enabled: true
  setting: "sd_nsfw"
  run_before_first_epoch: true
  interval_epochs: 3
  run_last: true
  keep_checkpoints: false          # false = remove epoch_eval/checkpoints after metrics/images are computed.
  clip_score: true                 # CLIP on unsafe/I2P prompts.
  ua: true                         # NudeNet UA on unsafe/I2P prompts.
  per_class_retain_accuracy: false # Class retain accuracy is not defined for image-only NSFW data.
  fid:
    enabled: true                  # FID on clothed probe images vs not_nsfw_data.
    max_real: 100
    max_fake: 20
    batch_size: 64
  n_probe_samples: 100
  num_samples_per_prompt: 1
  max_prompts: 125
  max_generated_images: 125
  generation_batch_size: 1       # Avoid VAE decode OOM while the training model is still resident.
  probe_generation_batch_size: 40 # GH200 120GB: faster probe eval while staying far below the OOM-prone full batch.
  guidance_scale: 7.5
  ddim_steps: 25
  n_outer: 1
  prompts_path: "prompts/unsafe-prompts-nudity-balanced-train125.csv"
  not_nsfw_data_path: null        # null = paths.not_nsfw_data injected by pipeline.
  nudenet:
    threshold: 0.6
    detailed: true

evaluate:
  num_samples_per_prompt: 1
  prompts_path: "prompts/unsafe-prompts-nudity-balanced-final750.csv"
  max_prompts: 750
  guidance_scale: 7.5
  ddim_steps: 100
  n_sample_images_per_class: 4
  n_probe_samples: 10
  generation_batch_size: 1
  probe_generation_batch_size: 40
  clip_score: true

  probe:
    enabled: true
    fid: true
    max_real: 100
    max_fake: 100

  fid:
    enabled: false
    max_real: null
    max_fake: null

  nudenet:
    enabled: true
    threshold: 0.6
    detailed: true

  coco:
    enabled: false
    n_captions: 10000
    num_samples_per_prompt: 1
    fid: true
    clip: true
    fid_feature: 2048
    max_real: null
    max_fake: null
    pregenerated_images_path: null
    pregenerated_prompts_csv: null
